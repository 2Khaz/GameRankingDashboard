name: 🧪 Full System Round-Trip Test

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: game-ranking-system-round-trip-test
  cancel-in-progress: false

jobs:
  full-system-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Install Dependencies Without Lockfile Changes
        id: install
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Create and Validate Temporary GCP Credentials
        id: credentials
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          if [ -z "$GCP_CREDENTIALS" ]; then
            echo "::error::GCP_CREDENTIALS Secret이 비어 있습니다."
            exit 1
          fi

          printf '%s' "$GCP_CREDENTIALS" > credentials.json

          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const credentials = JSON.parse(fs.readFileSync('credentials.json', 'utf8'));
          if (!credentials.client_email || !credentials.private_key) {
            throw new Error('GCP_CREDENTIALS에 client_email 또는 private_key가 없습니다.');
          }
          console.log('credentials.json 형식 검증 완료');
          NODE

      - name: Run Full Round-Trip Test
        id: round_trip_test
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node test_crawler.js

      - name: Remove All Local Test Files
        id: cleanup
        if: ${{ always() }}
        run: |
          rm -f credentials.json
          rm -rf .system-test-work
          rm -rf node_modules

          # 현재 저장소에 lock 파일이 없는데 npm이 새로 만든 경우에만 제거합니다.
          if [ -f package-lock.json ] && ! git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            rm -f package-lock.json
          fi

      - name: Verify Local Cleanup
        id: verify_cleanup
        if: ${{ always() }}
        run: |
          test ! -e credentials.json
          test ! -e .system-test-work

          CHANGES="$(git status --porcelain --untracked-files=all)"
          if [ -n "$CHANGES" ]; then
            echo "::error::테스트 종료 후 저장소 작업공간에 변경 파일이 남았습니다."
            printf '%s\n' "$CHANGES"
            exit 1
          fi

          echo "로컬 테스트 파일과 저장소 변경사항이 남아 있지 않습니다."

      # test_crawler.js가 상세 실패 알림을 이미 보냈다면 중복 전송하지 않습니다.
      # JS 실행 이전 단계에서 실패했거나 JS의 Discord 전송 자체가 실패한 경우에만 보조 알림을 보냅니다.
      - name: Notify Discord About Exact Failed Workflow Stage
        id: workflow_failure_alert
        if: ${{ always() && failure() }}
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_NODE_OUTCOME: ${{ steps.setup_node.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          CREDENTIALS_OUTCOME: ${{ steps.credentials.outcome }}
          TEST_OUTCOME: ${{ steps.round_trip_test.outcome }}
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
          VERIFY_CLEANUP_OUTCOME: ${{ steps.verify_cleanup.outcome }}
        run: |
          MARKER="$RUNNER_TEMP/game-ranking-system-test-failure-alert-sent"
          if [ -f "$MARKER" ]; then
            echo "test_crawler.js가 상세 Discord 실패 알림을 이미 전송했습니다. 중복 알림을 생략합니다."
            exit 0
          fi

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL Secret이 없어 워크플로 실패 알림을 보낼 수 없습니다."
            exit 1
          fi

          FAILED_STAGE="알 수 없는 GitHub Actions 단계"
          FAILED_STATUS="unknown"

          if [ "$CHECKOUT_OUTCOME" = "failure" ]; then
            FAILED_STAGE="1. GitHub 저장소 Checkout"
            FAILED_STATUS="$CHECKOUT_OUTCOME"
          elif [ "$SETUP_NODE_OUTCOME" = "failure" ]; then
            FAILED_STAGE="2. Node.js 20 환경 구성"
            FAILED_STATUS="$SETUP_NODE_OUTCOME"
          elif [ "$INSTALL_OUTCOME" = "failure" ]; then
            FAILED_STAGE="3. NPM 의존성 설치"
            FAILED_STATUS="$INSTALL_OUTCOME"
          elif [ "$CREDENTIALS_OUTCOME" = "failure" ]; then
            FAILED_STAGE="4. GCP credentials.json 생성 및 형식 검증"
            FAILED_STATUS="$CREDENTIALS_OUTCOME"
          elif [ "$TEST_OUTCOME" = "failure" ]; then
            FAILED_STAGE="5. test_crawler.js 전체 왕복 테스트"
            FAILED_STATUS="$TEST_OUTCOME"
          elif [ "$CLEANUP_OUTCOME" = "failure" ]; then
            FAILED_STAGE="6. 로컬 테스트 파일 삭제"
            FAILED_STATUS="$CLEANUP_OUTCOME"
          elif [ "$VERIFY_CLEANUP_OUTCOME" = "failure" ]; then
            FAILED_STAGE="7. 테스트 잔존물 최종 검증"
            FAILED_STATUS="$VERIFY_CLEANUP_OUTCOME"
          fi

          KST_TIME="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MESSAGE="🚨 **[시스템 자가 진단 실패] 테스트 워크플로 중 치명적 오류 발생!**
          시간: \`${KST_TIME}\`
          실패 구간: **${FAILED_STAGE}**
          단계 상태: \`${FAILED_STATUS}\`

          test_crawler.js 실행 전후의 GitHub Actions 단계에서 실패했습니다.
          정확한 오류 원문은 아래 Actions 실행 기록에서 확인해 주세요.
          GitHub Actions: ${RUN_URL}"

          export MESSAGE
          python3 - <<'PY' > discord-payload.json
          import json
          import os

          message = os.environ['MESSAGE'][:2000]
          print(json.dumps({'content': message}, ensure_ascii=False))
          PY

          curl \
            --fail \
            --silent \
            --show-error \
            -H "Content-Type: application/json" \
            -X POST \
            --data-binary @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
